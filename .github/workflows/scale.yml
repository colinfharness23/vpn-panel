name: Scheduled scale verification

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 0"

permissions:
  contents: read

concurrency:
  group: nova-scale-verification
  cancel-in-progress: true

jobs:
  scale:
    name: Verify 100,000 subscriptions across 50 inbounds
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run scale-only suites
        env:
          XUI_SCALE_TEST: "1"
          XUI_SCALE_SIZES: "100000"
        run: >-
          go test -p 1
          ./internal/web/service ./internal/sub ./internal/web/job
          -run 'Scale$' -count=1 -v -timeout 60m
