name: "CodeQL Advanced"

on:
  push:
    branches:
      - main
    tags-ignore:
      - "v*"
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "frontend/**"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "frontend/**"
  schedule:
    - cron: "18 2 * * 2"

jobs:
  analyze:
    # GitHub Code Scanning is unavailable to private personal repositories
    # without GitHub Advanced Security. Keep the workflow ready so it starts
    # enforcing CodeQL automatically if this release repository becomes public.
    if: ${{ github.event.repository.private == false }}
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    env:
      CODEQL_ACTION_FILE_COVERAGE_ON_PRS: true
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js
        if: matrix.language == 'go'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend bundle
        if: matrix.language == 'go'
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          category: "/language:${{matrix.language}}"
