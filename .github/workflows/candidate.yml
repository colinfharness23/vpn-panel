name: Ubuntu release candidate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "**.sh"
      - ".github/workflows/candidate.yml"
      - "deploy/ubuntu/**"
      - "frontend/**"
      - "x-ui.service.debian"

permissions:
  contents: read

jobs:
  verify:
    name: Verify application and database
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nova_candidate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nova_candidate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Verify generated contracts
        run: |
          npm run gen
          git diff --exit-code -- src/generated public/openapi.json
        working-directory: frontend

      - name: Verify frontend
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build
        working-directory: frontend

      - name: Verify Go services
        run: |
          go list ./... | grep -v '/frontend/node_modules/' > /tmp/go-packages.txt
          go test -p 1 -shuffle=on -count=1 -timeout 30m $(cat /tmp/go-packages.txt)

      - name: Verify PostgreSQL migrations and durable writes
        env:
          XUI_DB_TYPE: postgres
          XUI_DB_DSN: host=127.0.0.1 port=5432 user=postgres password=postgres dbname=nova_candidate sslmode=disable
          XUI_TEST_PG_DSN: host=127.0.0.1 port=5432 user=postgres password=postgres dbname=nova_candidate sslmode=disable
        run: |
          go test -p 1 ./internal/database -run 'Postgres|MigrateData' -count=1 -v -timeout 20m
          go test -p 1 ./internal/web/service -run 'PostgresCommitFailure' -count=1 -v -timeout 20m
          go test -p 1 ./internal/web/service/commercial -run 'PostgresLine' -count=1 -v -timeout 20m

      - name: Verify race safety
        run: go test -p 1 -race -shuffle=on -count=1 -timeout 45m ./internal/...

  installer-contract:
    name: Installer contract (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Validate scripts and interactive contract
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          bash -n deploy/ubuntu/*.sh
          shellcheck -S error -x deploy/ubuntu/*.sh
          install=deploy/ubuntu/install.sh
          grep -Fq '需要绑定的域名（例如 vpn.example.com）' "$install"
          grep -Fq '管理员登录账号' "$install"
          grep -Fq '管理员密码（至少 12 位' "$install"
          grep -Fq 'stty -echo' "$install"
          grep -Fq 'NOVA_DEFER_TLS' "$install"
          grep -Fq 'nova-finalize-domain' "$install"
          ! grep -Fq "Let's Encrypt 证书通知邮箱" "$install"
          grep -Fq -- '--register-unsafely-without-email' "$install"
          grep -Fq 'generate_admin_path' "$install"
          grep -Fq 'NOVA_RELEASE_ASSET_DIR' "$install"
          grep -Fq 'uninstall' "$install"
          grep -Fq '请输入 UNINSTALL 确认' deploy/ubuntu/uninstall.sh

  build-amd64:
    name: Build amd64 candidate archive
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend and server
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential unzip
          cd frontend
          npm ci
          npm run build
          cd ..
          mkdir -p x-ui/bin x-ui/deploy/ubuntu
          go build -ldflags "-w -s -X github.com/mhsanaei/3x-ui/v3/internal/config.buildCommit=${GITHUB_SHA::8}" -o x-ui/x-ui main.go
          cp x-ui.service.debian x-ui/
          cp x-ui.service.arch x-ui/
          cp x-ui.service.rhel x-ui/
          cp deploy/ubuntu/*.sh x-ui/deploy/ubuntu/
          chmod +x x-ui/x-ui x-ui/deploy/ubuntu/*.sh
          cp internal/web/service/config.json x-ui/bin/config.json

      - name: Add Xray runtime
        working-directory: x-ui/bin
        run: |
          curl -fL --retry 5 -o xray.zip https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip
          echo '23cd9af937744d97776ee35ecad4972cf4b2109d1e0fe6be9930467608f7c8ae  xray.zip' | sha256sum --check -
          unzip -q xray.zip
          rm xray.zip geoip.dat geosite.dat
          mv xray xray-linux-amd64
          curl -fL --retry 5 -o geoip.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/download/202607202253/geoip.dat
          curl -fL --retry 5 -o geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/download/202607202253/geosite.dat
          echo 'af332ab88eb4bb15e3cd10f03f5542e90655ee4bd5bf0e23949cfbd1e46bc20f  geoip.dat' | sha256sum --check -
          echo '32ef2379df257042dbf9d3e6779b42f1533ffece918a009470f4851ff2277923  geosite.dat' | sha256sum --check -

      - name: Add AnyTLS runtime
        working-directory: x-ui/bin
        run: |
          module=github.com/sagernet/sing-box
          version=v1.13.12
          metadata="$(go mod download -json "${module}@${version}")"
          test "$(jq -r .Sum <<<"$metadata")" = 'h1:U7znhM2VRq76ZdN4X5eRKdaUxHJNHMGKpo2csKqGTsg='
          source_dir="$(jq -r .Dir <<<"$metadata")"
          output="$PWD/sing-box-linux-amd64"
          cd "$source_dir"
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath \
              -tags 'with_utls,with_v2ray_api,badlinkname,tfogo_checklinkname0' \
              -ldflags '-s -w -X internal/godebug.defaultGODEBUG=multipathtcp=0 -checklinkname=0' \
              -o "$output" ./cmd/sing-box

      - name: Verify Trojan and Hysteria2 traffic through packaged Xray
        env:
          XRAY_E2E_BINARY: ${{ github.workspace }}/x-ui/bin/xray-linux-amd64
        run: go test ./internal/xray -run 'TestXrayProtocolConnectivity_E2E' -count=1 -v -timeout 2m

      - name: Verify managed AnyTLS chain and user traffic accounting
        env:
          SINGBOX_E2E_BINARY: ${{ github.workspace }}/x-ui/bin/sing-box-linux-amd64
        run: go test ./internal/web/service -run 'TestManagedAnyTLS(ConfigAcceptedBySingBox|ChainE2E)' -count=1 -v -timeout 3m

      - name: Package and validate candidate
        run: |
          tar -czf x-ui-linux-amd64.tar.gz x-ui
          sha256sum x-ui-linux-amd64.tar.gz > x-ui-linux-amd64.tar.gz.sha256
          sha256sum --check x-ui-linux-amd64.tar.gz.sha256
          tar -tzf x-ui-linux-amd64.tar.gz > /tmp/candidate-files.txt
          grep -Fxq x-ui/x-ui /tmp/candidate-files.txt
          grep -Fxq x-ui/bin/config.json /tmp/candidate-files.txt
          grep -Fxq x-ui/bin/xray-linux-amd64 /tmp/candidate-files.txt
          grep -Fxq x-ui/bin/sing-box-linux-amd64 /tmp/candidate-files.txt
          grep -Fxq x-ui/deploy/ubuntu/install.sh /tmp/candidate-files.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nova-ubuntu-amd64-candidate
          path: |
            x-ui-linux-amd64.tar.gz
            x-ui-linux-amd64.tar.gz.sha256
          retention-days: 3
          if-no-files-found: error
