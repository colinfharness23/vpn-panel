name: Ubuntu Installer Contract

on:
  push:
    branches:
      - "**"
    paths:
      - "deploy/ubuntu/**"
      - ".github/workflows/release.yml"
      - ".github/workflows/smoke.yml"
  pull_request:
    paths:
      - "deploy/ubuntu/**"
      - ".github/workflows/release.yml"
      - ".github/workflows/smoke.yml"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  installer-contract:
    if: github.event_name != 'release'
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Validate shell scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          bash -n deploy/ubuntu/*.sh
          shellcheck -S error -x deploy/ubuntu/*.sh

      - name: Validate the interactive installer contract
        run: |
          install=deploy/ubuntu/install.sh
          grep -Fq '管理员账号：' "$install"
          grep -Fq '管理员密码（至少 12 位' "$install"
          grep -Fq 'stty -echo' "$install"
          grep -Fq '已解析到本机的域名：' "$install"
          grep -Fq "Let's Encrypt 证书通知邮箱：" "$install"
          grep -Fq 'generate_admin_path' "$install"
          grep -Fq '^[0-9]{18}$' "$install"
          grep -Fq 'NOVA_RELEASE_ASSET_DIR' "$install"
          grep -Fq 'certbot --nginx --non-interactive --agree-tos --redirect' "$install"
          grep -Fq 'certbot renew' "$install"
          grep -Fq '/portal/' "$install"
          grep -Fq '/panel/' "$install"
          grep -Fq '${NOVA_SUB_PATH}health-probe' "$install"
          grep -Fq '安装和全部健康检查完成' "$install"

      - name: Validate update, backup, rollback and rotation helpers
        run: |
          for helper in update rollback backup rotate-admin-path; do
            test -s "deploy/ubuntu/${helper}.sh"
          done
          grep -Fq 'NOVA_ADMIN_PATH' deploy/ubuntu/update.sh
          grep -Fq 'NOVA_ADMIN_PATH' deploy/ubuntu/backup.sh
          grep -Fq 'NOVA_ADMIN_PATH' deploy/ubuntu/rollback.sh
          grep -Fq 'generate_admin_path' deploy/ubuntu/rotate-admin-path.sh

  release-assets:
    if: >-
      github.event_name == 'release' &&
      github.event.action == 'published' &&
      startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Download and verify published Ubuntu assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p /tmp/nova-release
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir /tmp/nova-release \
            --pattern 'x-ui-linux-*.tar.gz' \
            --pattern 'x-ui-linux-*.tar.gz.sha256'
          cd /tmp/nova-release
          sha256sum --check *.sha256
          test -f x-ui-linux-amd64.tar.gz
          test -f x-ui-linux-arm64.tar.gz
          for archive in x-ui-linux-amd64.tar.gz x-ui-linux-arm64.tar.gz; do
            tar -tzf "$archive" | grep -Fxq 'x-ui/bin/config.json'
            tar -tzf "$archive" | grep -Fxq 'x-ui/deploy/ubuntu/install.sh'
          done
