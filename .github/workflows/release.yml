name: Release NOVA Ubuntu

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "**.sh"
      - ".github/workflows/release.yml"
      - "deploy/ubuntu/**"
      - "frontend/**"
      - "x-ui.service.debian"
      - "x-ui.service.arch"
      - "x-ui.service.rhel"
jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nova_release
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nova_release"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Verify generated API contracts
        run: |
          npm run gen
          git diff --exit-code -- src/generated public/openapi.json
        working-directory: frontend

      - name: Verify frontend
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build
        working-directory: frontend

      - name: Verify Go services
        run: |
          go list ./... | grep -v '/frontend/node_modules/' > /tmp/go-packages.txt
          go test -p 1 -shuffle=on -count=1 -timeout 30m $(cat /tmp/go-packages.txt)

      - name: Verify PostgreSQL migrations and durable writes
        env:
          XUI_DB_TYPE: postgres
          XUI_DB_DSN: host=127.0.0.1 port=5432 user=postgres password=postgres dbname=nova_release sslmode=disable
          XUI_TEST_PG_DSN: host=127.0.0.1 port=5432 user=postgres password=postgres dbname=nova_release sslmode=disable
        run: |
          go test -p 1 ./internal/database -run 'Postgres|MigrateData' -count=1 -v
          go test -p 1 ./internal/web/service -run 'PostgresCommitFailure' -count=1 -v
          go test -p 1 ./internal/web/service/commercial -run 'PostgresLine' -count=1 -v

      - name: Verify Go race safety
        run: go test -p 1 -race -shuffle=on -count=1 -timeout 45m ./internal/...

  build:
    needs: verify
    permissions:
      contents: read
    strategy:
      matrix:
        platform:
          - amd64
          - arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          check-latest: true

      # Frontend dist must be built BEFORE go build — Go's //go:embed
      # all:dist directive in internal/web/web.go requires internal/web/dist/ to exist
      # at compile time. internal/web/dist/ is .gitignored, so on a fresh CI
      # checkout it doesn't exist until vite emits it.
      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend bundle
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Build 3X-UI
        run: |
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=${{ matrix.platform }}
          # Use an immutable Bootlin musl toolchain and verify it before the
          # compiler is allowed to influence a production binary.
          case "${{ matrix.platform }}" in
            amd64)
              BOOTLIN_ARCH="x86-64"
              BOOTLIN_TARBALL="x86-64--musl--stable-2025.08-1.tar.xz"
              BOOTLIN_SHA256="09fca3aa89540f1b01b5f4210d488cbeb00f522044c53e9989b1dd8a38076912"
              ;;
            arm64)
              BOOTLIN_ARCH="aarch64"
              BOOTLIN_TARBALL="aarch64--musl--stable-2025.08-1.tar.xz"
              BOOTLIN_SHA256="defba831ffa1175236f137069333e21ed46d4d19feb5080a90cf248b6fc2cb08"
              ;;
            *)
              echo "Unsupported release architecture: ${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac
          TARBALL_BASE="https://toolchains.bootlin.com/downloads/releases/toolchains/$BOOTLIN_ARCH/tarballs/"
          echo "Downloading pinned Bootlin toolchain: $BOOTLIN_TARBALL"
          cd /tmp
          curl -fL -sS -o "$BOOTLIN_TARBALL" "$TARBALL_BASE/$BOOTLIN_TARBALL"
          echo "$BOOTLIN_SHA256  $BOOTLIN_TARBALL" | sha256sum --check -
          tar -xf "$BOOTLIN_TARBALL"
          TOOLCHAIN_DIR="${BOOTLIN_TARBALL%.tar.xz}"
          [ -d "$TOOLCHAIN_DIR" ] || { echo "Toolchain archive layout is invalid" >&2; exit 1; }
          export PATH="$(realpath "$TOOLCHAIN_DIR")/bin:$PATH"
          export CC=$(realpath "$(find "$TOOLCHAIN_DIR/bin" -name '*-gcc.br_real' -type f -executable | head -n1)")
          [ -z "$CC" ] && { echo "No gcc.br_real found in $TOOLCHAIN_DIR/bin" >&2; exit 1; }
          cd -
          # Stamp the commit into per-commit (dev channel) builds only; tagged
          # stable releases stay unstamped so config.IsDevBuild() returns false.
          LDFLAGS="-w -s -linkmode external -extldflags '-static'"
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            LDFLAGS="$LDFLAGS -X github.com/mhsanaei/3x-ui/v3/internal/config.buildCommit=${GITHUB_SHA::8} -X github.com/mhsanaei/3x-ui/v3/internal/config.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          go build -ldflags "$LDFLAGS" -o xui-release -v main.go
          file xui-release
          ldd xui-release || echo "Static binary confirmed"

          mkdir x-ui
          cp xui-release x-ui/
          cp x-ui.service.debian x-ui/
          cp x-ui.service.arch x-ui/
          cp x-ui.service.rhel x-ui/
          mkdir -p x-ui/deploy/ubuntu
          cp deploy/ubuntu/*.sh x-ui/deploy/ubuntu/
          cp deploy/ubuntu/*.py x-ui/deploy/ubuntu/
          chmod +x x-ui/deploy/ubuntu/*.sh x-ui/deploy/ubuntu/*.py
          mv x-ui/xui-release x-ui/x-ui
          mkdir x-ui/bin
          # Ship a valid initial Xray configuration. The panel rewrites this
          # file after settings/inbounds change, but a fresh Ubuntu install
          # must not fail its first startup because bin/config.json is absent.
          cp internal/web/service/config.json x-ui/bin/config.json
          cd x-ui/bin

          # Download dependencies
          # Production packages use the latest non-prerelease Xray version that
          # was verified when this workflow was updated. Do not silently track a
          # prerelease tag in a stable NOVA build.
          Xray_URL="https://github.com/XTLS/Xray-core/releases/download/v26.3.27/"
          if [ "${{ matrix.platform }}" == "amd64" ]; then
            XRAY_ARCHIVE="Xray-linux-64.zip"
            XRAY_SHA256="23cd9af937744d97776ee35ecad4972cf4b2109d1e0fe6be9930467608f7c8ae"
          elif [ "${{ matrix.platform }}" == "arm64" ]; then
            XRAY_ARCHIVE="Xray-linux-arm64-v8a.zip"
            XRAY_SHA256="4d30283ae614e3057f730f67cd088a42be6fdf91f8639d82cb69e48cde80413c"
          fi
          wget -q "${Xray_URL}${XRAY_ARCHIVE}"
          echo "${XRAY_SHA256}  ${XRAY_ARCHIVE}" | sha256sum --check -
          unzip "$XRAY_ARCHIVE"
          rm -f "$XRAY_ARCHIVE"
          rm -f geoip.dat geosite.dat
          RULES_TAG="202607202253"
          IRAN_RULES_TAG="202607210715"
          RUSSIA_RULES_TAG="202607210611"
          wget -q "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/download/${RULES_TAG}/geoip.dat"
          wget -q "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/download/${RULES_TAG}/geosite.dat"
          wget -q -O geoip_IR.dat "https://github.com/chocolate4u/Iran-v2ray-rules/releases/download/${IRAN_RULES_TAG}/geoip.dat"
          wget -q -O geosite_IR.dat "https://github.com/chocolate4u/Iran-v2ray-rules/releases/download/${IRAN_RULES_TAG}/geosite.dat"
          wget -q -O geoip_RU.dat "https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/download/${RUSSIA_RULES_TAG}/geoip.dat"
          wget -q -O geosite_RU.dat "https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/download/${RUSSIA_RULES_TAG}/geosite.dat"
          cat <<'CHECKSUMS' | sha256sum --check -
          af332ab88eb4bb15e3cd10f03f5542e90655ee4bd5bf0e23949cfbd1e46bc20f  geoip.dat
          32ef2379df257042dbf9d3e6779b42f1533ffece918a009470f4851ff2277923  geosite.dat
          5854f4b21c3834899ddfbb2e3f64c5ec818b3427dca0d19168939d76480dfb07  geoip_IR.dat
          3c3a593355824f20123f69d060e60b7549e868f73e72898de53f6e38c77e0d8c  geosite_IR.dat
          a74020935f18e6458232a6fff769a5539f20170fefacd460fd70670a927540e6  geoip_RU.dat
          019616520463357dea4ae92d5de0e6355646a4d10535873c4951fc59c4ea0115  geosite_RU.dat
          CHECKSUMS
          mv xray xray-linux-${{ matrix.platform }}

          # The upstream prebuilt executable omits with_v2ray_api. NOVA needs
          # that module to apply the same per-customer traffic quotas to AnyTLS
          # as to Xray protocols, so build the immutable official tag with the
          # minimum audited feature set and verify its immutable Go module sum
          # before executing the compiler.
          SINGBOX_MODULE="github.com/sagernet/sing-box"
          SINGBOX_VERSION="v1.13.12"
          SINGBOX_SUM="h1:U7znhM2VRq76ZdN4X5eRKdaUxHJNHMGKpo2csKqGTsg="
          SINGBOX_METADATA="$(go mod download -json "${SINGBOX_MODULE}@${SINGBOX_VERSION}")"
          test "$(jq -r .Sum <<<"$SINGBOX_METADATA")" = "$SINGBOX_SUM"
          SINGBOX_SOURCE="$(jq -r .Dir <<<"$SINGBOX_METADATA")"
          SINGBOX_OUTPUT="$PWD/sing-box-linux-${{ matrix.platform }}"
          cd "$SINGBOX_SOURCE"
          GOOS=linux GOARCH=${{ matrix.platform }} CGO_ENABLED=0 \
            go build -trimpath \
              -tags 'with_utls,with_v2ray_api,badlinkname,tfogo_checklinkname0' \
              -ldflags '-s -w -X internal/godebug.defaultGODEBUG=multipathtcp=0 -checklinkname=0' \
              -o "$SINGBOX_OUTPUT" ./cmd/sing-box
          cd "$(dirname "$SINGBOX_OUTPUT")"
          cd ../..

      - name: Verify Trojan and Hysteria2 traffic through packaged Xray
        if: matrix.platform == 'amd64'
        env:
          XRAY_E2E_BINARY: ${{ github.workspace }}/x-ui/bin/xray-linux-amd64
        run: go test ./internal/xray -run 'TestXrayProtocolConnectivity_E2E' -count=1 -v -timeout 2m

      - name: Verify managed AnyTLS chain and user traffic accounting
        if: matrix.platform == 'amd64'
        env:
          SINGBOX_E2E_BINARY: ${{ github.workspace }}/x-ui/bin/sing-box-linux-amd64
        run: go test ./internal/web/service -run 'TestManagedAnyTLS(ConfigAcceptedBySingBox|ChainE2E)' -count=1 -v -timeout 3m

      - name: Package
        run: |
          tar -zcvf x-ui-linux-${{ matrix.platform }}.tar.gz x-ui
          sha256sum x-ui-linux-${{ matrix.platform }}.tar.gz > x-ui-linux-${{ matrix.platform }}.tar.gz.sha256

      - name: Verify Ubuntu release archive
        run: |
          sha256sum --check x-ui-linux-${{ matrix.platform }}.tar.gz.sha256
          tar -tzf x-ui-linux-${{ matrix.platform }}.tar.gz > /tmp/release-files.txt
          for required in \
            x-ui/x-ui \
            x-ui/bin/config.json \
            x-ui/bin/xray-linux-${{ matrix.platform }} \
            x-ui/bin/sing-box-linux-${{ matrix.platform }} \
            x-ui/deploy/ubuntu/install.sh \
            x-ui/deploy/ubuntu/update.sh \
            x-ui/deploy/ubuntu/rollback.sh \
            x-ui/deploy/ubuntu/backup.sh \
            x-ui/deploy/ubuntu/rotate-admin-path.sh \
            x-ui/deploy/ubuntu/uninstall.sh \
            x-ui/deploy/ubuntu/finalize-domain.sh \
            x-ui/deploy/ubuntu/sync-line-cert.sh \
            x-ui/deploy/ubuntu/diagnose-active-subscription.py \
            x-ui/deploy/ubuntu/diagnose-managed-ingress.py; do
            grep -Fxq "$required" /tmp/release-files.txt || {
              echo "missing release file: $required" >&2
              exit 1
            }
          done

      - name: Upload files to Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: x-ui-linux-${{ matrix.platform }}
          path: |
            ./x-ui-linux-${{ matrix.platform }}.tar.gz
            ./x-ui-linux-${{ matrix.platform }}.tar.gz.sha256

  publish-stable:
    name: Publish stable Ubuntu release
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Verify and publish the complete release atomically
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          cd release-artifacts
          test -f x-ui-linux-amd64.tar.gz
          test -f x-ui-linux-arm64.tar.gz
          test -f x-ui-linux-amd64.tar.gz.sha256
          test -f x-ui-linux-arm64.tar.gz.sha256
          sha256sum --check x-ui-linux-amd64.tar.gz.sha256
          sha256sum --check x-ui-linux-arm64.tar.gz.sha256
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = true || {
              echo "Release $GITHUB_REF_NAME is already published; refusing to replace immutable assets." >&2
              exit 1
            }
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --draft \
              --title "NOVA $GITHUB_REF_NAME" --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            x-ui-linux-amd64.tar.gz x-ui-linux-amd64.tar.gz.sha256 \
            x-ui-linux-arm64.tar.gz x-ui-linux-arm64.tar.gz.sha256 --clobber
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --draft=false --prerelease=false --latest

  # =================================
  #  Rolling dev channel (per-commit)
  # =================================
  # Publishes/overwrites the build artifacts to a single fixed-tag pre-release
  # `dev-latest`, force-moved to the new commit on every push to main. The panel's
  # "Dev" update channel installs from this tag. `--latest=false` is load-bearing:
  # it keeps releases/latest pointing at the real stable tag, so the stable
  # channel is unaffected.
  publish-dev:
    name: Publish rolling dev release
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialize racing pushes; never cancel an in-flight upload, or the dev
    # release could be left with a partial asset set.
    concurrency:
      group: dev-release
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dev-artifacts
          merge-multiple: true

      - name: Publish dev-latest pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT: ${{ github.sha }}
        run: |
          set -e
          short="${COMMIT::8}"
          notes="Rolling development build — installs via the panel's Dev update channel.

          commit=${COMMIT}
          built=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          Automated per-commit build from main. Not a stable release."

          # Force-move the dev-latest tag to this commit so the release tracks it.
          git tag -f dev-latest "${COMMIT}"
          git push -f origin refs/tags/dev-latest

          if gh release view dev-latest >/dev/null 2>&1; then
            gh release edit dev-latest --prerelease --latest=false \
              --title "Dev build ${short}" --notes "${notes}"
          else
            gh release create dev-latest --prerelease --latest=false \
              --target "${COMMIT}" --title "Dev build ${short}" --notes "${notes}"
          fi

          gh release upload dev-latest dev-artifacts/*.tar.gz --clobber
